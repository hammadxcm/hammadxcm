<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Hammad Khan</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0D1117;color:#E6EDF3;font-family:system-ui,-apple-system,sans-serif}
    .container{text-align:center;padding:2rem;max-width:480px}
    h1{font-size:2rem;margin-bottom:1rem;color:#00bfbf}
    p{color:#8B949E;margin-bottom:1.5rem;line-height:1.6}
    button{background:transparent;border:1px solid #00bfbf;color:#00bfbf;padding:0.75rem 2rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:all 0.2s}
    button:hover{background:rgba(0,191,191,0.1)}
    .icon{font-size:3rem;margin-bottom:1rem;filter:drop-shadow(0 0 12px rgba(0,191,191,0.4))}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F4E1;</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your connection. Check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
