name: Profile 3D Contrib

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Move to generated folder
        run: |
          mkdir -p generated
          rm -rf generated/profile-3d-contrib
          mv profile-3d-contrib generated/

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Generate 3D contribution graph [skip ci]"
          branch: auto/profile-3d-contrib
          title: "Update 3D contribution graph"
          body: "Automated regeneration of the 3D profile contribution SVGs."
          add-paths: generated/profile-3d-contrib/**
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --auto
