name: GitHub Metrics

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: metrics-update
  cancel-in-progress: false

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Reset metrics branch
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main -q '.object.sha')
          gh api repos/${{ github.repository }}/git/refs/heads/auto/metrics-update \
            -X PATCH -f sha="$SHA" -f force=true 2>/dev/null || \
          gh api repos/${{ github.repository }}/git/refs \
            -X POST -f ref="refs/heads/auto/metrics-update" -f sha="$SHA"

      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.classic.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: auto/metrics-update
          committer_message: "Update ${filename} [skip ci]"
          user: hammadxcm
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: UTC
          repositories_skipped: hammadxcm.github.io, hammadxcm
          plugin_traffic: yes
          plugin_gists: yes
          plugin_lines: yes
          plugin_lines_history_limit: 3
          plugin_lines_delay: 30
          plugin_lines_repositories_limit: 10
          plugin_lines_sections: base, repositories

      - name: Full-year calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.fullyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: auto/metrics-update
          committer_message: "Update ${filename} [skip ci]"
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Most used languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: auto/metrics-update
          committer_message: "Update ${filename} [skip ci]"
          base: ""
          commits_authoring: hammadxcm, hammadxcm@users.noreply.github.com
          plugin_languages: yes
          plugin_languages_skipped: hammadxcm
          plugin_languages_limit: 24
          plugin_languages_threshold: 0%
          plugin_languages_colors: github
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_load: 300
          plugin_languages_recent_days: 14

      - name: Recently starred
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.stars.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: auto/metrics-update
          committer_message: "Update ${filename} [skip ci]"
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 3

      - name: Notable contributions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.notable.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_branch: auto/metrics-update
          committer_message: "Update ${filename} [skip ci]"
          base: ""
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request
          plugin_notable_repositories: yes

      - name: LeetCode
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.leetcode.svg
          token: NOT_NEEDED
          committer_branch: auto/metrics-update
          committer_message: "Update ${filename} [skip ci]"
          base: ""
          plugin_leetcode_user: hammadxcm
          plugin_leetcode: yes
          plugin_leetcode_sections: solved, skills

      - uses: actions/checkout@v6

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr list --head auto/metrics-update --state open --json number -q '.[0].number')
          if [ -z "$PR" ]; then
            gh pr create --base main --head auto/metrics-update \
              --title "Update GitHub metrics" \
              --body "Automated update of GitHub metrics SVGs."
          fi

      - name: Enable auto-merge
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr list --head auto/metrics-update --state open --json number -q '.[0].number')
          [ -n "$PR" ] && gh pr merge "$PR" --squash --auto
