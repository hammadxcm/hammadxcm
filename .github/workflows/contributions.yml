name: Update OSS Contributions

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-contributions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Fetch contributions (for README table)
        run: node scripts/fetch-contributions.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: hammadxcm
          EXCLUDE_ORGS: ""
          MIN_STARS: "0"
          MAX_ITEMS: "50"

      - run: npm ci

      - name: Format generated JSON
        run: npx biome check --write src/data/contributions.json

      - name: Inject into README
        run: |
          node -e "
            const fs = require('fs');
            const readme = fs.readFileSync('README.md', 'utf8');
            const snippet = fs.existsSync('CONTRIBUTIONS_README.md')
              ? fs.readFileSync('CONTRIBUTIONS_README.md', 'utf8')
              : '';
            const start = '<!-- CONTRIBUTIONS:START -->';
            const end = '<!-- CONTRIBUTIONS:END -->';
            const si = readme.indexOf(start);
            const ei = readme.indexOf(end);
            if (si === -1 || ei === -1) { console.log('Markers not found'); process.exit(0); }
            const updated = readme.substring(0, si + start.length) + '\n' + snippet + '\n' + readme.substring(ei);
            fs.writeFileSync('README.md', updated);
          "
          rm -f CONTRIBUTIONS_README.md

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update README contributions table [skip ci]"
          branch: auto/update-contributions
          title: "Update README contributions table"
          body: "Automated update of the contributions table in README."
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --auto
