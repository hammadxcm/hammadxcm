name: Update OSS Contributions

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  update-contributions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch contributions
        run: node scripts/fetch-contributions.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: hammadxcm
          EXCLUDE_ORGS: ""
          MIN_STARS: "0"
          MAX_ITEMS: "20"

      - name: Fetch projects
        run: node scripts/fetch-projects.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: hammadxcm
          MAX_REPOS: "30"

      - name: Inject into README
        run: |
          node -e "
            const fs = require('fs');
            const readme = fs.readFileSync('README.md', 'utf8');
            const snippet = fs.existsSync('CONTRIBUTIONS_README.md')
              ? fs.readFileSync('CONTRIBUTIONS_README.md', 'utf8')
              : '';
            const start = '<!-- CONTRIBUTIONS:START -->';
            const end = '<!-- CONTRIBUTIONS:END -->';
            const si = readme.indexOf(start);
            const ei = readme.indexOf(end);
            if (si === -1 || ei === -1) { console.log('Markers not found'); process.exit(0); }
            const updated = readme.substring(0, si + start.length) + '\n' + snippet + '\n' + readme.substring(ei);
            fs.writeFileSync('README.md', updated);
          "
          rm -f CONTRIBUTIONS_README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/contributions.json src/data/projects.json README.md
          git diff --cached --quiet || git commit -m "Update OSS contributions & projects [skip ci]"
          git push
